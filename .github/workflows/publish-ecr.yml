name: Publish to ECR

permissions:
  id-token: write   # required for OIDC
  contents: read

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to build'
        required: true
        type: choice
        options:
          - execd
          - egress
          - ingress
          - controller
          - server
          - helm-chart
          - all
        default: 'all'
      image_tag:
        description: 'Image / chart tag (e.g. v0.1.0)'
        required: true
  push:
    tags:
      - 'docker/execd/**'
      - 'docker/ingress/**'
      - 'k8s/controller/**'
      - 'docker/server/**'
      - 'helm/**'

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ROLE_ARN: ${{ vars.SUPERSANDBOX_ECR_PUSH_ROLE_ARN }}

jobs:
  # ──────────────────────────────────────────────
  # Determine which components to build
  # ──────────────────────────────────────────────
  resolve-matrix:
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.ref, 'refs/tags/helm/')
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Parse tag and set variables
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_PATH="${GITHUB_REF#refs/tags/}"
            COMPONENT=$(echo "$TAG_PATH" | cut -d'/' -f2)
            IMAGE_TAG=$(echo "$TAG_PATH" | cut -d'/' -f3)
          else
            COMPONENT="${{ inputs.component }}"
            IMAGE_TAG="${{ inputs.image_tag }}"
          fi
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build matrix
        id: set-matrix
        run: |
          COMPONENT="${{ steps.vars.outputs.component }}"

          ALL='[
            {"name":"execd",      "dockerfile":"components/execd/Dockerfile",   "context":".","build_args":""},
            {"name":"egress",     "dockerfile":"components/egress/Dockerfile",  "context":".","build_args":""},
            {"name":"ingress",    "dockerfile":"components/ingress/Dockerfile", "context":".","build_args":""},
            {"name":"server",     "dockerfile":"server/Dockerfile",             "context":"server/","build_args":""},
            {"name":"controller", "dockerfile":"kubernetes/Dockerfile",         "context":"kubernetes/","build_args":"PACKAGE=cmd/controller/main.go"}
          ]'

          if [[ "$COMPONENT" == "all" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$ALL" | jq -c "[.[] | select(.name == \"$COMPONENT\")]")
          fi

          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Build & push component images (parallel matrix)
  # ──────────────────────────────────────────────
  publish-images:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Build and push ${{ matrix.name }}
        env:
          TAG: ${{ needs.resolve-matrix.outputs.image_tag }}
        run: |
          REPO="${{ env.ECR_REGISTRY }}/supersandbox/${{ matrix.name }}"
          TAGS="-t ${REPO}:${TAG}"
          [[ "$TAG" == v* ]] && TAGS="$TAGS -t ${REPO}:latest"

          BUILD_ARGS=""
          if [[ -n "${{ matrix.build_args }}" ]]; then
            BUILD_ARGS="--build-arg ${{ matrix.build_args }}"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $BUILD_ARGS \
            $TAGS \
            -f ${{ matrix.dockerfile }} \
            --push ${{ matrix.context }}


  # ──────────────────────────────────────────────
  # Package & push Helm chart to ECR OCI
  # ──────────────────────────────────────────────
  publish-helm:
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/helm/') ||
      (github.event_name == 'workflow_dispatch' && (inputs.component == 'helm-chart' || inputs.component == 'all') && inputs.image_tag != 'latest')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Parse chart version from tag
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/helm/* ]]; then
            TAG_PATH="${GITHUB_REF#refs/tags/}"
            CHART=$(echo "$TAG_PATH" | cut -d'/' -f2)
            VERSION=$(echo "$TAG_PATH" | cut -d'/' -f3)
            VERSION="${VERSION#v}"
          else
            CHART="opensandbox"
            VERSION="${{ inputs.image_tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "chart=$CHART" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Helm dependencies
        run: |
          helm dependency update kubernetes/charts/${{ steps.vars.outputs.chart }}

      - name: Validate version is semver
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          if [[ "$VERSION" == "latest" || -z "$VERSION" ]]; then
            echo "Error: image_tag must be a semver version (e.g. 0.1.0), not 'latest'"
            exit 1
          fi

      - name: Package Helm chart
        run: |
          helm package kubernetes/charts/${{ steps.vars.outputs.chart }} \
            --version ${{ steps.vars.outputs.version }} \
            --app-version ${{ steps.vars.outputs.version }}

      - name: Push Helm chart to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login \
              --username AWS \
              --password-stdin \
              ${{ env.ECR_REGISTRY }}

          helm push \
            ${{ steps.vars.outputs.chart }}-${{ steps.vars.outputs.version }}.tgz \
            oci://${{ env.ECR_REGISTRY }}/supersandbox/helm-charts
